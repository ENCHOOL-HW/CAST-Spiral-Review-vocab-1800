<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

:root {
  --purple: #5C35A8;
  --purple-dark: #3D1F7A;
  --purple-light: #6B42C2;
  --purple-xlight: #8B6AD4;
  --purple-pale: #E8E2F8;
  --purple-card: #F2EEF9;
  --purple-border: #C9C0E8;
  --purple-bg: #F7F4FC;
  --white: #FFFFFF;
  --text: #1A1730;
  --text2: #3D3060;
  --text3: #8070AA;
  --red: #EF4444;
  --green: #059669;
  --green-card: #ECFDF5;
  --green-border: #6EE7B7;
  --shadow: 0 2px 12px rgba(92,53,168,0.10);
  --shadow-lg: 0 8px 32px rgba(92,53,168,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--purple-bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }

/* ── 홈 화면 ── */
#homeScreen { display: block; padding: 0 0 40px; overflow-x: hidden; }
#studyScreen { display: none; }

.home-header {
  background: var(--purple-dark);
  padding: 44px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.home-header-badge {
  display: inline-block;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  color: rgba(255,255,255,0.9);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
  position: relative;
  letter-spacing: 0.06em;
}
.home-header-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  position: relative;
  line-height: 1.4;
  margin-bottom: 2px;
}
.home-header-sub {
  font-size: 1.5rem;
  font-weight: 900;
  color: #fff;
  position: relative;
  line-height: 1.4;
  margin-bottom: 14px;
}
.home-header-desc {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.7);
  position: relative;
  font-weight: 400;
}

.home-stats { display: none; }

.section-title {
  padding: 20px 16px 10px;
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.day-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 0 14px;
  box-sizing: border-box;
  max-width: 100%;
}
.day-card {
  background: var(--white);
  border: 1.5px solid var(--purple-border);
  border-radius: 14px;
  padding: 10px 4px;
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 62px;
}
.day-card:active { transform: scale(0.95); }
.day-card-num {
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.day-card-label {
  font-size: 1rem;
  font-weight: 900;
  color: var(--purple);
  line-height: 1.1;
}

/* ── 학습 화면 헤더 ── */
.study-header {
  background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 100%);
  padding: 14px 16px 12px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.back-btn {
  background: rgba(255,255,255,0.18); border: none;
  color: #fff; width: 36px; height: 36px; border-radius: 10px;
  font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.study-title-block { flex: 1; }
#studyTitle { font-size: 1.1rem; font-weight: 900; color: #fff; }
.study-count { font-size: 0.72rem; color: rgba(255,255,255,0.7); font-weight: 600; }

/* ── 모드 탭 ── */
.mode-tabs {
  background: var(--white);
  border-bottom: 1.5px solid var(--purple-border);
  position: sticky; top: 56px; z-index: 90;
}
.mode-tabs-row {
  display: flex;
  border-bottom: 1px solid var(--purple-border);
}
.mode-tabs-row:last-child { border-bottom: none; }
.mode-tab {
  flex: 1;
  padding: 10px 6px;
  font-size: 0.78rem; font-weight: 700;
  color: var(--text3); cursor: pointer;
  border: none; background: transparent;
  border-bottom: 2.5px solid transparent;
  white-space: nowrap; transition: color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  border-right: 1px solid var(--purple-border);
  text-align: center;
}
.mode-tab:last-child { border-right: none; }
.mode-tab.active { color: var(--purple); border-bottom-color: var(--purple); background: var(--purple-card); }

/* ── 단어 목록 ── */
#listPane { padding: 10px 14px 100px; }

.list-toolbar {
  display: flex; gap: 8px; padding: 0 0 10px;
  align-items: center; flex-wrap: wrap;
}
.toggle-btn {
  background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  color: var(--text2); padding: 7px 14px;
  border-radius: 20px; font-size: 0.8rem;
  font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.toggle-btn.on { background: var(--purple); color: #fff; border-color: var(--purple); }
.shuffle-btn {
  background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  color: var(--text2); padding: 7px 14px;
  border-radius: 20px; font-size: 0.8rem;
  font-weight: 700; cursor: pointer;
  margin-left: auto;
}

.word-item {
  background: var(--white);
  border: 1.5px solid var(--purple-border);
  border-radius: 14px;
  padding: 13px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow);
  position: relative;
}
.word-eng { font-size: 1.05rem; font-weight: 800; color: var(--text); min-width: 90px; flex-shrink: 0; }
.word-kor { font-size: 0.82rem; color: var(--text2); flex: 1; line-height: 1.5; }
.blur { filter: blur(5px); user-select: none; transition: filter 0.2s; }
.word-item.revealed .word-eng.blur,
.word-item.revealed .word-kor.blur { filter: none; }
.reveal-btn {
  display: none;
  position: absolute; inset: 0;
  background: transparent; border: none;
  cursor: pointer; border-radius: 14px;
  font-size: 0; z-index: 1;
}
.word-item.has-hidden .reveal-btn { display: block; }
.spk-btn {
  background: transparent; border: none; font-size: 1.1rem; cursor: pointer;
  padding: 4px; border-radius: 8px; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s;
}
.spk-btn:active { transform: scale(0.85); }
.spk-btn.playing { animation: pulseSpk 0.5s ease infinite alternate; }
@keyframes pulseSpk { from{opacity:1} to{opacity:0.4} }

/* ── 플래시카드 ── */
#fcPane { padding: 14px 14px 100px; display: none; }
.fc-counter {
  text-align: center; font-size: 0.8rem;
  font-weight: 700; color: var(--text3); margin-bottom: 10px;
}
.fc-progress-bar {
  height: 4px; background: var(--purple-pale);
  border-radius: 4px; margin-bottom: 18px; overflow: hidden;
}
.fc-bar-fill {
  height: 100%; background: var(--purple);
  border-radius: 4px; transition: width 0.4s ease;
}
.fc-scene { perspective: 900px; width: 100%; margin-bottom: 18px; }
.fc-card {
  position: relative; width: 100%;
  min-height: 200px; cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  -webkit-tap-highlight-color: transparent;
}
.fc-card.flipped { transform: rotateY(180deg); }
.fc-front, .fc-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px;
  box-shadow: var(--shadow-lg);
}
.fc-front {
  background: linear-gradient(145deg, var(--purple-dark), var(--purple-light));
}
.fc-front-label { font-size: 0.65rem; font-weight: 800; color: rgba(255,255,255,0.6); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
.fc-word { font-family: 'Noto Sans KR', sans-serif; font-size: 2rem; font-weight: 900; color: #fff; text-align: center; line-height: 1.2; }
.fc-hint { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 16px; }
.fc-back { background: var(--white); border: 2px solid var(--purple-border); transform: rotateY(180deg); }
.fc-back-label { font-size: 0.65rem; font-weight: 800; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
.fc-meaning { font-size: 1.25rem; font-weight: 700; color: var(--text); text-align: center; line-height: 1.5; }
.fc-eng-small { font-size: 0.85rem; color: var(--text3); margin-top: 10px; }

.fc-controls {
  display: flex; gap: 10px; align-items: center; justify-content: center;
}
.fc-nav-btn {
  background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  color: var(--purple); width: 44px; height: 44px;
  border-radius: 12px; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.fc-nav-btn:disabled { opacity: 0.3; }
.fc-spk-btn {
  background: var(--purple-card); border: 1.5px solid var(--purple-border);
  color: var(--text2); padding: 10px 20px; border-radius: 12px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
}
.fc-shuffle-btn {
  background: var(--purple); border: none;
  color: #fff; padding: 10px 20px; border-radius: 12px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
}

/* ── 뜻→영어 퀴즈 ── */
#meaningPane { padding: 14px 14px 100px; display: none; }
.quiz-score-bar {
  display: flex; gap: 8px; margin-bottom: 16px; align-items: center;
}
.score-chip {
  flex: 1; background: var(--white); border: 1.5px solid var(--purple-border);
  border-radius: 12px; padding: 10px 8px; text-align: center;
  box-shadow: var(--shadow);
}
.score-chip .sc-num { font-size: 1.4rem; font-weight: 900; }
.score-chip .sc-label { font-size: 0.65rem; color: var(--text3); font-weight: 700; }
.sc-num.ok { color: var(--green); }
.sc-num.ng { color: var(--red); }
.sc-num.left { color: var(--purple); }

.quiz-q-box {
  background: var(--white);
  border: 2px solid var(--purple-border);
  border-radius: 20px;
  padding: 28px 20px 20px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  margin-bottom: 14px;
}
.quiz-label { font-size: 0.82rem; font-weight: 700; color: var(--text3); margin-bottom: 14px; }
#mWord { font-size: 1.2rem; font-weight: 800; color: var(--text); line-height: 1.5; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; }
.qopt {
  width: 100%; background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  color: var(--text); padding: 14px 16px;
  border-radius: 14px; font-size: 0.92rem;
  font-weight: 700; cursor: pointer; text-align: left;
  transition: background 0.15s, border-color 0.15s, color 0.15s;

}
.qopt:hover:not(:disabled) { border-color: var(--purple); }
.qopt.correct { background: var(--green-card); border-color: var(--green); color: var(--green); }
.qopt.wrong { background: #FEF2F2; border-color: var(--red); color: var(--red); }
.qopt:disabled { cursor: default; }
.next-btn {
  display: none; width: 100%;
  background: var(--purple); border: none;
  color: #fff; padding: 14px; border-radius: 14px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  margin-top: 10px;
}
.next-btn.show { display: block; }

/* ── 스펠링 ── */
#spellPane { padding: 14px 14px 100px; display: none; }
.spell-q-box {
  background: var(--white); border: 2px solid var(--purple-border);
  border-radius: 20px; padding: 28px 20px 20px;
  box-shadow: var(--shadow-lg); margin-bottom: 14px;
}
#spWord { font-size: 1.15rem; font-weight: 800; color: var(--text); text-align: center; line-height: 1.5; margin-bottom: 20px; }
.spell-input {
  width: 100%; background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  color: var(--text); padding: 14px 16px;
  border-radius: 12px; font-size: 1rem;
  font-weight: 700; outline: none;
  font-family: 'Noto Sans KR', sans-serif;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}
.spell-input:focus { border-color: var(--purple); }
.spell-input.ok { border-color: var(--green); background: #ECFDF5; }
.spell-input.ng { border-color: var(--red); background: #FEF2F2; }
.spell-fb { min-height: 22px; font-size: 0.82rem; text-align: center; margin-bottom: 10px; font-weight: 600; }
.spell-fb.ok { color: var(--green); }
.spell-fb.ng { color: var(--red); }
.spell-submit {
  width: 100%; background: var(--purple);
  border: none; color: #fff;
  padding: 15px; border-radius: 14px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
}

/* ── 결과 화면 ── */
.result-box {
  display: none;
  background: var(--white);
  border: 2px solid var(--purple-border);
  border-radius: 20px;
  padding: 36px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-top: 16px;
}
.result-box.show { display: block; }
.result-em { font-size: 3rem; margin-bottom: 12px; }
.result-title { font-size: 1.6rem; font-weight: 900; color: var(--purple); margin-bottom: 6px; }
.result-sub { font-size: 0.9rem; color: var(--text2); margin-bottom: 22px; }
.retry-btn {
  background: var(--purple-card);
  border: 2px solid var(--purple-border);
  color: var(--purple);
  padding: 12px 28px; border-radius: 12px;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
}

/* ── 랜덤 테스트 ── */
#randomPane { display: none; padding: 14px 14px 100px; }
.rand-toolbar {
  display: flex; gap: 8px; padding: 0 0 12px;
  align-items: center; flex-wrap: wrap;
}
.rand-submit-all {
  background: var(--purple); color: #fff;
  border: none; padding: 10px 20px; border-radius: 20px;
  font-size: 0.85rem; font-weight: 700; cursor: pointer;
}
.rand-list { display: flex; flex-direction: column; gap: 10px; }
.rand-item {
  background: var(--white);
  border: 1.5px solid var(--purple-border);
  border-radius: 14px;
  padding: 14px;
  box-shadow: var(--shadow);
}
.rand-item.correct { background: #F0FFF4; border-color: var(--green); }
.rand-item.wrong { background: #FFF5F5; border-color: var(--red); }
.rand-type {
  font-size: 0.65rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text3);
  font-weight: 700; margin-bottom: 6px;
}
.rand-given {
  font-size: 1rem; font-weight: 700; color: var(--text);
  margin-bottom: 8px; line-height: 1.4;
}
.rand-input {
  width: 100%; background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  color: var(--text); padding: 10px 12px;
  border-radius: 10px; font-size: 0.95rem;
  font-weight: 600; outline: none;
  transition: border-color 0.2s;
}
.rand-input:focus { border-color: var(--purple); }
.rand-input.ok { border-color: var(--green); background: #E8F5E9; color: var(--green); }
.rand-input.ng { border-color: var(--red); background: #FFEBEE; }
.rand-input:disabled { opacity: 0.85; }
.rand-answer { font-size: 0.78rem; color: var(--red); font-weight: 700; min-height: 18px; margin-top: 4px; display: none; }
.rand-answer.show { display: block; }
.rand-score-row {
  display: none; gap: 10px; margin-bottom: 14px;
}
.rand-score-chip {
  flex: 1; background: var(--white); border: 1.5px solid var(--purple-border);
  border-radius: 12px; padding: 10px 8px; text-align: center;
  box-shadow: var(--shadow);
}

/* ── 애니메이션 ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.word-item { animation: fadeUp 0.2s ease both; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.shake { animation: shake 0.3s ease; }

/* ── 데이 네비 ── */
.day-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1.5px solid var(--purple-border);
  padding: 10px 14px 14px;
  display: flex; gap: 8px; align-items: center;
  z-index: 50;
}
.day-nav-prev, .day-nav-next {
  flex: 0 0 44px; height: 44px;
  background: var(--purple-card);
  border: 1.5px solid var(--purple-border);
  border-radius: 12px;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--purple); font-weight: 700;
}
.day-nav-prev:disabled, .day-nav-next:disabled { opacity: 0.3; }
.day-nav-label {
  flex: 1; text-align: center;
  font-size: 0.9rem; font-weight: 800; color: var(--purple);
}
</style>

<body>

<!-- ════════════ 홈 화면 ════════════ -->
<div id="homeScreen">
  <div class="home-header">
    <div class="home-header-badge">누적 테스트</div>
    <div class="home-header-title">뜯어먹는</div>
    <div class="home-header-sub">수능 1등급 기본 누적 1800</div>
    <div class="home-header-desc">Day를 선택해서 학습을 시작하세요</div>
  </div>
  <div class="section-title">DAY 선택</div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<!-- ════════════ 학습 화면 ════════════ -->
<div id="studyScreen">
  <div class="study-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="study-title-block">
      <div id="studyTitle">Day 1</div>
  
    </div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tabs-row">
      <button class="mode-tab active" data-mode="list" onclick="switchMode('list')">목록</button>
      <button class="mode-tab" data-mode="meaning" onclick="switchMode('meaning')">뜻 테스트</button>
      <button class="mode-tab" data-mode="spell" onclick="switchMode('spell')">스펠링 테스트</button>
    </div>
    <div class="mode-tabs-row">
      <button class="mode-tab" data-mode="random" onclick="switchMode('random')">랜덤 테스트</button>
      <button class="mode-tab" data-mode="fc" onclick="switchMode('fc')">플래시카드</button>
    </div>
  </div>

  <!-- 목록 -->
  <div id="listPane">
    <div class="list-toolbar">
      <button class="toggle-btn" id="tKor" onclick="toggleKor()">한국어 숨기기</button>
      <button class="toggle-btn" id="tEng" onclick="toggleEng()">영어 숨기기</button>
      <button class="shuffle-btn" onclick="shuffleList()">섞기</button>
    </div>
    <div id="wordList"></div>
  </div>

  <!-- 플래시카드 -->
  <div id="fcPane">
    <div class="fc-counter"><span id="fcCounter">1 / 30</span></div>
    <div class="fc-progress-bar"><div class="fc-bar-fill" id="fcBar" style="width:3%"></div></div>
    <div class="fc-scene">
      <div class="fc-card" id="fcCard" onclick="flipFC()">
        <div class="fc-front">
          <div class="fc-front-label">ENGLISH</div>
          <div class="fc-word" id="fcWord">—</div>
          <div class="fc-hint">탭하여 뒤집기</div>
        </div>
        <div class="fc-back">
          <div class="fc-back-label">한국어 뜻</div>
          <div class="fc-meaning" id="fcMeaning">—</div>
          <div class="fc-eng-small" id="fcEngSmall"></div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-nav-btn" id="fcPrev" onclick="fcMove(-1)">‹</button>
      <button class="fc-spk-btn" onclick="spkFC(event)">🔊</button>
      <button class="fc-shuffle-btn" onclick="fcShuffle()">섞기</button>
      <button class="fc-nav-btn" id="fcNext" onclick="fcMove(1)">›</button>
    </div>
  </div>

  <!-- 뜻→영어 퀴즈 -->
  <div id="meaningPane">
    <div class="quiz-score-bar">
      <div class="score-chip"><div class="sc-num ok" id="mC">0</div><div class="sc-label">정답</div></div>
      <div class="score-chip"><div class="sc-num ng" id="mW">0</div><div class="sc-label">오답</div></div>
      <div class="score-chip"><div class="sc-num left" id="mL">0</div><div class="sc-label">남음</div></div>
    </div>
    <div class="quiz-q-box">
      <div class="quiz-label">뜻에 맞는 영단어를 고르세요</div>
      <div id="mWord">—</div>
    </div>
    <div class="quiz-opts" id="mOpts"></div>
    <button class="next-btn" id="mNext" onclick="nextQ('meaning')">다음 문제 →</button>
    <div class="result-box" id="mResult">
      <div class="result-em" id="mEm">🎉</div>
      <div class="result-title">완료!</div>
      <div class="result-sub" id="mSub"></div>
      <button class="retry-btn" onclick="startMeaning()">전체 다시 풀기</button>
      <button class="retry-btn" id="mRetryWrong" style="display:none;margin-left:8px" onclick="retryWrong('meaning')">틀린 문제만 다시 풀기</button>
    </div>
  </div>

  <!-- 스펠링 -->
  <div id="spellPane">
    <div class="quiz-score-bar">
      <div class="score-chip"><div class="sc-num ok" id="spC">0</div><div class="sc-label">정답</div></div>
      <div class="score-chip"><div class="sc-num ng" id="spW">0</div><div class="sc-label">오답</div></div>
      <div class="score-chip"><div class="sc-num left" id="spL">0</div><div class="sc-label">남음</div></div>
    </div>
    <div class="spell-q-box">
      <div class="quiz-label">뜻을 보고 영어 단어를 입력하세요</div>
      <div id="spWord">—</div>

      <div class="spell-fb" id="spFb"></div>
      <button class="spell-submit" onclick="submitSpell()">확인</button>
    </div>
    <div class="result-box" id="spResult">
      <div class="result-em">🎉</div>
      <div class="result-title">완료!</div>
      <div class="result-sub" id="spSub"></div>
      <button class="retry-btn" onclick="startSpell()">전체 다시 풀기</button>
      <button class="retry-btn" id="spRetryWrong" style="display:none;margin-left:8px" onclick="retryWrong('spell')">틀린 문제만 다시 풀기</button>
    </div>
  </div>

  <!-- 랜덤 테스트 -->

        <div class="rand-score-chip"><div class="sc-num ok" id="randC">0</div><div class="sc-label">정답</div></div>

      </div>
      <button class="retry-btn" id="randRetryWrong" style="display:none" onclick="retryWrongRandom()"></button>

    <div class="result-box" id="randResult">
      <div class="result-em" id="randEm">🎉</div>
      <div class="result-title">완료!</div>
      <div class="result-sub" id="randSub"></div>
      <button class="retry-btn" onclick="startRandom()">전체 다시 풀기</button>
    </div>
    <div class="rand-list" id="randList"></div>
  </div>

  <!-- 하단 Day 네비 -->
  <div class="day-nav">
    <button class="day-nav-prev" id="dnPrev" onclick="changeDay(-1)">‹</button>
    <div class="day-nav-label" id="dnLabel">Day 1</div>
    <button class="day-nav-next" id="dnNext" onclick="changeDay(1)">›</button>
  </div>
</div>

const DAYS = Object.keys(VOCAB);
let curDay = DAYS[0], curList = [], dispList = [];
let hideKor = false, hideEng = false;
let fcList=[], fcIdx=0;
let mList=[], mIdx=0, mC=0, mW=0, mWrongList=[];
let spList=[], spIdx=0, spC=0, spW=0, spPending=false, spWrongList=[];
let randItems=[], randWrongItems=[], randGraded=false;
let englishVoices=[], speakTimer=null, isSpeaking=false;

function buildHome(){
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = DAYS.map((d,i)=>{
    const num = d.replace('누적 Day ','');
    return `<div class="day-card" onclick="openDay('${d}')">
      <div class="day-card-num">누적</div>
      <div class="day-card-label">Day ${num}</div>
    </div>`;
  }).join('');
}

function openDay(day){
  curDay = day; curList = [...VOCAB[day]]; dispList = [...curList];
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('studyScreen').style.display = 'block';
  document.getElementById('studyTitle').textContent = day;
  document.getElementById('dnLabel').textContent = day;
  updateDayNav(); switchMode('list'); window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('studyScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'block';
  window.scrollTo(0,0);
}

function changeDay(dir){
  const idx = DAYS.indexOf(curDay), next = idx + dir;
  if(next < 0 || next >= DAYS.length) return;
  openDay(DAYS[next]);
}

function updateDayNav(){
  const idx = DAYS.indexOf(curDay);
  document.getElementById('dnPrev').disabled = idx === 0;
  document.getElementById('dnNext').disabled = idx === DAYS.length - 1;
  document.getElementById('dnLabel').textContent = curDay;
}

function switchMode(mode){
  ['listPane','fcPane','meaningPane','spellPane','randomPane'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  const paneId = mode==='list'?'listPane':mode==='fc'?'fcPane':mode+'Pane';
  document.getElementById(paneId).style.display='block';
  if(mode==='list')    renderList();
  if(mode==='fc')      startFC();
  if(mode==='meaning') startMeaning();
  if(mode==='spell')   startSpell();
  if(mode==='random')  startRandom();
}

function renderList(){
  const list = document.getElementById('wordList');
  list.innerHTML = dispList.map((item,i)=>`
    <div class="word-item${(hideEng||hideKor)?' has-hidden':''}" style="animation-delay:${Math.min(i*0.02,0.4)}s" id="wi-${i}">
      <div class="word-eng${hideEng?' blur':''}"><span>${item.w}</span></div>
      <div class="word-kor${hideKor?' blur':''}">${item.m}</div>
      <button class="reveal-btn" onclick="revealItem(${i})"></button>
      <button class="spk-btn" onclick="speak('${item.w.replace(/'/g,"\\'")}',this)">🔊</button>
    </div>
  `).join('');
}

function revealItem(i){
  const el = document.getElementById('wi-'+i);
  if(!el) return;
  el.classList.toggle('revealed');
}

function toggleKor(){ hideKor=!hideKor; document.getElementById('tKor').classList.toggle('on',hideKor); renderList(); }
function toggleEng(){ hideEng=!hideEng; document.getElementById('tEng').classList.toggle('on',hideEng); renderList(); }
function shuffleList(){ dispList=shuffle([...curList]); renderList(); }

function startFC(){
  fcList=[...curList]; fcIdx=0;
  document.getElementById('fcCard').classList.remove('flipped');
  updateFC();
}
function updateFC(){
  const card = document.getElementById('fcCard');
  const doUpdate = ()=>{
    const item = fcList[fcIdx];
    document.getElementById('fcWord').textContent = item.w;
    document.getElementById('fcMeaning').textContent = item.m;
    document.getElementById('fcEngSmall').textContent = item.w;
    document.getElementById('fcCounter').textContent = `${fcIdx+1} / ${fcList.length}`;
    document.getElementById('fcBar').style.width = `${(fcIdx+1)/fcList.length*100}%`;
    document.getElementById('fcPrev').disabled = fcIdx===0;
    document.getElementById('fcNext').disabled = fcIdx===fcList.length-1;
  };
  if(card.classList.contains('flipped')){ card.classList.remove('flipped'); setTimeout(doUpdate,460); } else { doUpdate(); }
}
function flipFC(){ document.getElementById('fcCard').classList.toggle('flipped'); }
function spkFC(e){ e.stopPropagation(); speak(document.getElementById('fcWord').textContent); }
function fcMove(dir){ fcIdx=Math.max(0,Math.min(fcList.length-1,fcIdx+dir)); updateFC(); }
function fcShuffle(){ fcList=shuffle([...curList]); fcIdx=0; document.getElementById('fcCard').classList.remove('flipped'); updateFC(); }

function startMeaning(){
  mList=shuffle([...curList]); mIdx=0; mC=0; mW=0; mWrongList=[];
  document.getElementById('mResult').classList.remove('show');
  document.getElementById('mRetryWrong').style.display='none';
  updateScores('m'); renderM();
}
function renderM(){
  if(mIdx>=mList.length){endMeaning();return;}
  const item=mList[mIdx];
  document.getElementById('mWord').textContent=item.m;
  document.getElementById('mC').textContent=mC;
  document.getElementById('mW').textContent=mW;
  document.getElementById('mL').textContent=mList.length-mIdx;
  const opts=shuffle([item,...getRandWrong(item,3)]);
  document.getElementById('mOpts').innerHTML=opts.map(o=>`
    <button class="qopt" onclick="answerM(this,'${esc(o.w)}','${esc(item.w)}',${mIdx})">${o.w}</button>
  `).join('');
  document.getElementById('mNext').classList.remove('show');
}
function answerM(btn,chosen,correct,idx){
  document.querySelectorAll('#mOpts .qopt').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct) b.classList.add('correct');
  });
  if(chosen===correct){ mC++; btn.classList.add('correct');}
  else{ mW++; btn.classList.add('wrong'); mWrongList.push(mList[idx]);}
  updateScores('m');
  document.getElementById('mNext').classList.add('show');
}
function nextQ(type){ if(type==='meaning'){mIdx++;renderM();} }
function endMeaning(){
  document.getElementById('mOpts').innerHTML='';
  document.getElementById('mNext').classList.remove('show');
  const r=document.getElementById('mResult'); r.classList.add('show');
  const pct=Math.round(mC/mList.length*100);
  document.getElementById('mEm').textContent=pct>=80?'🎉':pct>=50?'👍':'💪';
  document.getElementById('mSub').textContent=`${mList.length}문제 중 ${mC}개 정답 (${pct}%)`;
  if(mWrongList.length>0){ document.getElementById('mRetryWrong').style.display='inline-block'; document.getElementById('mRetryWrong').textContent=`틀린 ${mWrongList.length}문제 다시 풀기`; }
}

function startSpell(){
  spList=shuffle([...curList]); spIdx=0; spC=0; spW=0; spPending=false; spWrongList=[];
  document.getElementById('spResult').classList.remove('show');
  document.getElementById('spRetryWrong').style.display='none';
  document.getElementById('spWord').closest('.spell-q-box').style.display='block';
  updateScores('sp'); renderSpell();
}
function renderSpell(){
  if(spIdx>=spList.length){endSpell();return;}
  const item=spList[spIdx];
  document.getElementById('spWord').textContent=item.m;
  document.getElementById('spL').textContent=spList.length-spIdx;
  const inp=document.getElementById('spInput');
  inp.value=''; inp.className='spell-input';
  document.getElementById('spFb').textContent='';
  document.getElementById('spFb').className='spell-fb';
  spPending=false;
  setTimeout(()=>inp.focus(),50);
}
function submitSpell(){
  const item=spList[spIdx];
  const inp=document.getElementById('spInput');
  const val=inp.value.trim();
  if(!val) return;
  if(spPending){ spIdx++; renderSpell(); return; }
  const fb=document.getElementById('spFb');
  if(val.toLowerCase()===item.w.toLowerCase()){
    inp.className='spell-input ok'; fb.textContent='✅ 정답!'; fb.className='spell-fb ok'; spC++;
  } else {
    inp.className='spell-input ng'; fb.textContent=`❌ 정답: ${item.w}`; fb.className='spell-fb ng';
    inp.classList.add('shake'); setTimeout(()=>inp.classList.remove('shake'),350);
    spW++; spWrongList.push(item);
  }
  updateScores('sp'); spPending=true;
}
function endSpell(){
  document.getElementById('spWord').closest('.spell-q-box').style.display='none';
  const r=document.getElementById('spResult'); r.classList.add('show');
  const pct=Math.round(spC/spList.length*100);
  document.getElementById('spSub').textContent=`${spList.length}문제 중 ${spC}개 정답 (${pct}%)`;
  if(spWrongList.length>0){ document.getElementById('spRetryWrong').style.display='inline-block'; document.getElementById('spRetryWrong').textContent=`틀린 ${spWrongList.length}문제 다시 풀기`; }
}

function retryWrong(type){
  if(type==='meaning'){
    mList=shuffle([...mWrongList]); mIdx=0; mC=0; mW=0; mWrongList=[];
    document.getElementById('mResult').classList.remove('show');
    document.getElementById('mRetryWrong').style.display='none';
    updateScores('m'); renderM();
  } else {
    spList=shuffle([...spWrongList]); spIdx=0; spC=0; spW=0; spPending=false; spWrongList=[];
    document.getElementById('spResult').classList.remove('show');
    document.getElementById('spRetryWrong').style.display='none';
    document.getElementById('spWord').closest('.spell-q-box').style.display='block';
    updateScores('sp'); renderSpell();
  }
}

function startRandom(list){
  const src = list || curList;
  randItems = shuffle([...src]).map(item=>({ item, type: Math.random()<0.5?'eng':'kor' }));
  randGraded = false; randWrongItems = [];
  document.getElementById('randResult').classList.remove('show');
  document.getElementById('randScoreRow').style.display = 'none';
  document.getElementById('randRetryWrong').style.display = 'none';
  document.getElementById('randSubmitBtn').style.display = 'block';
  renderRandom();
}
function renderRandom(){
  const container = document.getElementById('randList');
  container.innerHTML = randItems.map((r,i)=>{
    const {item,type} = r;
    const given = type==='eng' ? item.w : item.m;
    const typeLabel = type==='eng' ? '한국어 뜻을 입력하세요' : '영어 단어를 입력하세요';
    const placeholder = type==='eng' ? '뜻 입력...' : '영어 입력...';
    return `
      <div class="rand-item" id="ri-${i}">
        <div class="rand-type">${typeLabel}</div>
        <div class="rand-given">${given}</div>
        <input class="rand-input" id="ri-inp-${i}" placeholder="${placeholder}"
          autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'){document.getElementById('ri-inp-${Math.min(i+1,randItems.length-1)}').focus()}"
          data-idx="${i}">
        <div class="rand-answer" id="ri-ans-${i}"></div>
      </div>
    `;
  }).join('');
  setTimeout(()=>{const f=document.getElementById('ri-inp-0');if(f)f.focus();},80);
}
function submitRandom(){
  if(randGraded){startRandom();return;}
  randGraded=true; randWrongItems=[];
  let correct=0;
  randItems.forEach((r,i)=>{
    const inp=document.getElementById('ri-inp-'+i);
    const row=document.getElementById('ri-'+i);
    const ansEl=document.getElementById('ri-ans-'+i);
    if(!inp) return;
    const val=inp.value.trim();
    const answer = r.type==='eng' ? r.item.m : r.item.w;
    inp.disabled=true;
    const clean=s=>s.toLowerCase().replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'').replace(/[~\-_.,!?]/g,'').replace(/\s+/g,'').trim();
    let isCorrect=false;
    if(r.type==='kor'){ isCorrect=clean(val)===clean(answer); }
    else { const answers=answer.split(/[,，]/).map(a=>clean(a)); const cv=clean(val); isCorrect=cv.length>0&&answers.some(a=>a.length>0&&(a===cv||a.includes(cv)||cv.includes(a))); }
    if(isCorrect){ correct++; row.classList.add('correct'); inp.classList.add('ok'); }
    else { row.classList.add('wrong'); inp.classList.add('ng'); ansEl.textContent='정답: '+answer; ansEl.classList.add('show'); randWrongItems.push(r); }
  });
  const total=randItems.length, pct=Math.round(correct/total*100);
  document.getElementById('randScoreRow').style.display='flex';
  document.getElementById('randSubmitBtn').style.display='none';
  document.getElementById('randC').textContent=correct;
  document.getElementById('randW').textContent=total-correct;
  document.getElementById('randEm').textContent=pct>=80?'🎉':pct>=50?'👍':'💪';
  document.getElementById('randSub').textContent=`${total}문제 중 ${correct}개 정답 (${pct}%)`;
  document.getElementById('randResult').classList.add('show');
  if(randWrongItems.length>0){ const btn=document.getElementById('randRetryWrong'); btn.style.display='inline-block'; btn.textContent=`틀린 ${randWrongItems.length}단어 다시 풀기`; }
  const fw=document.querySelector('.rand-item.wrong');
  if(fw) fw.scrollIntoView({behavior:'smooth',block:'center'});
}
function retryWrongRandom(){ startRandom(randWrongItems.map(r=>r.item)); }

function updateScores(prefix){
  if(prefix==='m'){ document.getElementById('mC').textContent=mC; document.getElementById('mW').textContent=mW; document.getElementById('mL').textContent=Math.max(0,mList.length-mIdx); }
  else { document.getElementById('spC').textContent=spC; document.getElementById('spW').textContent=spW; document.getElementById('spL').textContent=Math.max(0,spList.length-spIdx); }
}
function getRandWrong(item,n){ return shuffle(curList.filter(x=>x.w!==item.w)).slice(0,n); }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function setBestVoices(){ if(!('speechSynthesis' in window)) return; englishVoices=window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en')); }
function getBestVoice(){ if(!englishVoices.length) return null; for(const name of ['Samantha','Daniel','Alex','Karen','Google US English','Microsoft Aria Online']){ const v=englishVoices.find(v=>v.name.includes(name)); if(v) return v; } return englishVoices.find(v=>v.lang.toLowerCase()==='en-us')||englishVoices[0]; }
if('speechSynthesis' in window){ setBestVoices(); window.speechSynthesis.onvoiceschanged=setBestVoices; }
function speak(word,btn){ if(!('speechSynthesis' in window)) return; if(speakTimer){clearTimeout(speakTimer);speakTimer=null;} try{window.speechSynthesis.cancel();}catch(e){} isSpeaking=false; const u=new SpeechSynthesisUtterance(word); u.lang='en-US';u.rate=0.95;u.pitch=1;u.volume=1; const v=getBestVoice(); if(v){u.voice=v;u.lang=v.lang;} u.onstart=()=>{isSpeaking=true;if(btn)btn.classList.add('playing');}; u.onend=()=>{isSpeaking=false;if(btn)btn.classList.remove('playing');}; u.onerror=()=>{isSpeaking=false;if(btn)btn.classList.remove('playing');}; speakTimer=setTimeout(()=>{if(!isSpeaking)window.speechSynthesis.speak(u);speakTimer=null;},60); }

buildHome();
</script>
